server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # CORS is handled by SecurityConfig's CorsConfigurationSource bean (restricted origins).
      # globalcors is intentionally omitted — it would allow any origin and bypass the bean.

    loadbalancer:
      ribbon:
        enabled: false

  redis:
    host: localhost
    port: 6379

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    com.egov.tendering.gateway: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      tenderServiceCircuitBreaker:
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

  timelimiter:
    instances:
      userServiceTimeLimiter:
        timeoutDuration: 2s
        cancelRunningFuture: true
      tenderServiceTimeLimiter:
        timeoutDuration: 4s
        cancelRunningFuture: true

# Custom properties
app:
  gateway:
    default-timeout: 10000
    connect-timeout: 2000
    # Paths accessible without authentication (any HTTP method).
    # Add new public endpoints here — no code change required.
    public-paths:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/auth/**
      - /api/users/register
    # Paths accessible without authentication for GET requests only.
    public-get-paths:
      - /api/tenders
      - /api/tenders/*
      - /api/tenders/*/clarifications/public

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  max-age: ${CORS_MAX_AGE:3600}

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: test
  redis:
    host: localhost
    port: 6379

---
spring:
  config:
    activate:
      on-profile: prod
  redis:
    host: redis
    port: 6379
