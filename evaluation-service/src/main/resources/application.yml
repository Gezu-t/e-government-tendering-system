server:
  port: ${SERVER_PORT:8087}
  servlet:
    context-path: /

spring:
  application:
    name: evaluation-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:evaluation_service}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.egov.tendering.*"
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8080/auth/realms/egov-tendering}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    preferIpAddress: true

feign:
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 60000
        loggerLevel: full
  circuitbreaker:
    enabled: true
  compression:
    request:
      enabled: true
    response:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

# Custom application properties
app:
  committee:
    default-required-review-count: ${EVALUATION_COMMITTEE_REQUIRED_REVIEW_COUNT:3}
    default-minimum-approval-count: ${EVALUATION_COMMITTEE_MINIMUM_APPROVAL_COUNT:3}
  kafka:
    topics:
      evaluation-created: evaluation-created
      evaluation-updated: evaluation-updated
      evaluation-status-changed: evaluation-status-changed
      evaluation-deleted: evaluation-deleted
      tender-evaluation-completed: tender-evaluation-completed
      tender-evaluation-approved: tender-evaluation-approved
      review-created: review-created
      review-updated: review-updated
      review-deleted: review-deleted
  feign:
    tender-service: tender-service
    bid-service: bidding-service
    user-service: user-service
