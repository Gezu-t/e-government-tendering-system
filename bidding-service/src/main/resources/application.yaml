spring:
  application:
    name: bidding-service

  # Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bidding_service}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.egov.tendering.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Bid sealing cryptographic parameters — all overridable via config-server
bidding:
  seal:
    encryption-algorithm: AES/GCM/NoPadding
    hash-algorithm: SHA-256
    gcm-tag-length: 128
    gcm-iv-length: 12
    unseal-check-cron: "0 */15 * * * *"
    # 256-bit master key for wrapping content encryption keys (envelope encryption).
    # Required — must be supplied via SEALING_MASTER_KEY env var.
    # Generate with: openssl rand -base64 32
    master-key-base64: ${SEALING_MASTER_KEY}

# Application Specific Configuration
app:
  file-storage:
    upload-dir: uploads/bids
  feign:
    tender-service: tender-service
  kafka:
    topics:
      bid-events: bid-events
      tender-events: tender-events
      evaluation-events: evaluation-events
      tender-evaluation-completed: tender-evaluation-completed
      contract-events: contract-events

# Server Configuration
server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /



# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    diskspace:
      enabled: true
