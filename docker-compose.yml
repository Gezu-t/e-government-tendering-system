version: '3.8'

# E-Government Tendering System - Full Stack Docker Compose
# Usage:
#   Full stack:    docker-compose up -d
#   Infra only:    docker-compose up -d mysql kafka zookeeper redis
#   Core services: docker-compose up -d discovery-service config-service gateway-service
#   Stop all:      docker-compose down
#   Reset data:    docker-compose down -v

services:

  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  mysql:
    image: mysql:8.0
    container_name: egov-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "false"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker-common/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - egov-network

  redis:
    image: redis:7-alpine
    container_name: egov-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - egov-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: egov-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - egov-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: egov-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - egov-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: egov-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: egov-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - egov-network

  # ============================================================
  # CORE SERVICES
  # ============================================================

  discovery-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-service
        SERVICE_PORT: 8761
    container_name: egov-discovery
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - egov-network

  config-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config-service
        SERVICE_PORT: 8888
    container_name: egov-config
    ports:
      - "8888:8888"
    depends_on:
      discovery-service:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - egov-network

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway-service
        SERVICE_PORT: 8080
    container_name: egov-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - egov-network

  # ============================================================
  # BUSINESS SERVICES
  # ============================================================

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
        SERVICE_PORT: 8081
    container_name: egov-user
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=user_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - egov-network

  tender-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: tender-service
        SERVICE_PORT: 8082
    container_name: egov-tender
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=tender_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - egov-network

  bidding-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: bidding-service
        SERVICE_PORT: 8083
    container_name: egov-bidding
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=bidding_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SEALING_MASTER_KEY=${SEALING_MASTER_KEY}
    volumes:
      - bid_uploads:/app/uploads
    networks:
      - egov-network

  contract-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: contract-service
        SERVICE_PORT: 8084
    container_name: egov-contract
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=contract_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - egov-network

  document-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: document-service
        SERVICE_PORT: 8085
    container_name: egov-document
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=document_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - document_uploads:/app/uploads
    networks:
      - egov-network

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: 8086
    container_name: egov-notification
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=notification_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - egov-network

  evaluation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: evaluation-service
        SERVICE_PORT: 8087
    container_name: egov-evaluation
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=evaluation_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - egov-network

  audit-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: audit-service
        SERVICE_PORT: 8088
    container_name: egov-audit
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_CONFIG_URI=http://config-service:8888
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=audit_service
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - egov-network

# ============================================================
# NETWORKS & VOLUMES
# ============================================================

networks:
  egov-network:
    driver: bridge

volumes:
  mysql_data:
  bid_uploads:
  document_uploads:
