server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
    loadbalancer:
      ribbon:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
          jwk-set-uri: ${JWT_JWK_SET_URI}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  max-age: ${CORS_MAX_AGE:3600}

app:
  gateway:
    default-timeout: ${GATEWAY_DEFAULT_TIMEOUT:10000}
    connect-timeout: ${GATEWAY_CONNECT_TIMEOUT:2000}
    # Paths accessible without authentication (any HTTP method).
    # Add new public endpoints here — no code change required.
    public-paths:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /api/auth/**
      - /api/users/register
    # Paths accessible without authentication for GET requests only.
    public-get-paths:
      - /api/tenders
      - /api/tenders/*
      - /api/tenders/*/clarifications/public

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
